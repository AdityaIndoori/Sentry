; P1.2 — Alembic configuration.
;
; Run `alembic -c backend/persistence/alembic.ini upgrade head` from the
; repository root to apply migrations. The actual DB URL is sourced at
; runtime from ``DATABASE_URL`` (see ``migrations/env.py``), not from
; ``sqlalchemy.url`` below — we leave that pointing at a harmless
; in-memory URL so stale configs never target the production DB.

[alembic]
script_location = backend/persistence/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///:memory:

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
