# ──────────────────────────────────────────────────────────────────
# P3.1 — Tightened CSP + rate-limit + SSE-friendly proxy config.
#
# Changes vs. the pre-P3.1 baseline:
#   * Stricter CSP: no ``'unsafe-inline'`` for scripts; ``connect-src``
#     includes ``self`` only (the ``/api/`` prefix is proxied).
#   * ``frame-ancestors 'none'`` — belt-and-braces against clickjacking
#     alongside ``X-Frame-Options: DENY``.
#   * ``Permissions-Policy`` — lock down APIs we don't use.
#   * ``Cross-Origin-*`` headers for site isolation.
#   * ``limit_req_zone`` + ``limit_req`` on ``/api/`` to blunt brute
#     force / DoS attempts (SEC-40).
#   * SSE-aware proxy block for ``/api/stream/*`` — disables buffering
#     and extends ``proxy_read_timeout`` so long-lived
#     ``/api/stream/incidents`` connections survive.
#   * Server banner suppressed (``server_tokens off``).
# ──────────────────────────────────────────────────────────────────

server_tokens off;

# 60 requests / minute / IP, burst 30 → sustained rate ≈ 1 req/s with
# a burst window for normal page loads.
limit_req_zone $binary_remote_addr zone=sentry_api:10m rate=60r/m;

server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    # CSP — same-origin only. No remote fonts / scripts. ``connect-src``
    # covers the proxied /api and the SSE stream.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Compression — safe to enable for JSON / text; modern browsers
    # negotiate ``Accept-Encoding``.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/javascript application/json application/xml text/css text/plain text/xml image/svg+xml;

    # ── SSE: /api/stream/* (P2.4) ───────────────────────────────
    # Matched BEFORE the generic /api/ block because nginx location
    # matching is longest-prefix. We disable buffering and bump the
    # read timeout so long-lived connections don't get dropped.
    location /api/stream/ {
        proxy_pass http://backend:8000/api/stream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        # The key bits — disable buffering so events flush to the client.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        # Keep the connection alive for hours.
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        # Required by some CDNs / proxies.
        add_header X-Accel-Buffering no;
    }

    # ── Other API requests ──────────────────────────────────────
    location /api/ {
        # Apply rate-limit. ``burst=30 nodelay`` allows short bursts
        # (dashboard page load fires several requests) but throttles
        # sustained traffic.
        limit_req zone=sentry_api burst=30 nodelay;

        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
    }

    # Prometheus scrape endpoint (non-/api/). Matches the
    # GET /metrics route added in P2.3b.
    location /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reply body size cap — guards the trigger/watcher endpoints
    # against oversized POSTs (SEC-50).
    client_max_body_size 1m;
}
