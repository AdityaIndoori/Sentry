name: CI

# P3.2 — Continuous Integration pipeline.
#
# Runs on every pull request + every push to master. Enforces:
#
#   * Python dep install + unit+E2E test suite (SENTRY_E2E=1)
#   * Frontend build + vitest (when the frontend has tests)
#   * Trivy filesystem scan for vulnerable deps
#   * SBOM generation for the backend image (CycloneDX JSON)
#
# The job is green when the full pytest suite passes at the same count
# documented in ops/E2E_TEST_CATALOG.md ("Test Scoreboard" section).

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # Trivy SARIF upload

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend: lint + type-check + tests
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Dev-only tooling used by this workflow.
          pip install ruff==0.15.11 mypy==1.20.2

      - name: Ruff (lint)
        # P4.5: after the retirement pass ``ruff check backend`` exits
        # clean; flipped from ``|| true`` soft-fail to fail-on-error so
        # any new lint regression blocks the merge.
        run: ruff check backend/ --output-format=github

      - name: Mypy (typecheck)
        # P4.9f: CI mypy is now **hard-fail**. Every PR must pass
        # ``mypy backend/ --ignore-missing-imports`` or the merge is
        # blocked. The P4.9a..P4.9e sweep drained every meaningful
        # annotation backlog:
        #
        #   * P4.9a — ``backend.agents.*`` + ``backend.tools.*`` generics
        #   * P4.9b — ``backend.persistence.repositories.*`` generics
        #   * P4.9c — retired ``backend.orchestrator.*`` override
        #   * P4.9d — ``IAuditLog`` Protocol retires the factory's
        #             audit_log type split
        #   * P4.9e — retired ``backend.api.app`` override, 900-line
        #             gateway is fully annotated + OpenAPI snapshot
        #             verified unchanged
        #
        # Only the legacy ``backend.shared.*`` override remains (its
        # container / factory / models / config / constants / prompts /
        # security / vault / agent_throttle / ai_gateway / audit_log /
        # settings modules are not all drained yet — that's a future
        # sweep, out of scope for CI-hardening). The ``--ignore-missing-
        # imports`` flag stays because optional dependencies (openai,
        # hvac, opentelemetry-*) don't always ship type stubs at CI
        # install time.
        #
        # To add a new strict module: fix it, run
        # ``python -m mypy backend/ --ignore-missing-imports`` locally,
        # and add it to the ``strict-islands`` list in ``pyproject.toml``.
        # To retire the remaining ``backend.shared.*`` relaxing
        # override: drain each module one at a time using the same
        # slice pattern (one commit per module), then delete the
        # override block + promote to strict-islands.
        run: mypy backend/ --ignore-missing-imports

      - name: Pytest (unit + E2E)
        env:
          SENTRY_E2E: '1'
        run: |
          python -m pytest backend/tests/ \
            --cov=backend --cov-report=xml --cov-report=term \
            -q -W ignore::DeprecationWarning

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────
  # Frontend: build + vitest (when tests exist)
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint (eslint, if configured)
        working-directory: frontend
        run: npm run lint --if-present

      - name: Test (vitest, if configured)
        working-directory: frontend
        run: npm test --if-present -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # Security: Trivy filesystem + image scans, SBOM
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — dependency + config scan
        # P4.9g: pinned to a resolving tag. The previous ``0.20.0`` pin
        # stopped resolving on the Marketplace because aquasecurity
        # switched their tagging scheme from bare ``X.Y.Z`` to ``vX.Y.Z``
        # around mid-2025. ``v0.36.0`` is the current latest release
        # (verified via ``gh api repos/aquasecurity/trivy-action/releases``).
        uses: aquasecurity/trivy-action@v0.36.0

        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Don't fail the build on findings yet; upload to GitHub
          # Security tab so reviewers can triage.
          exit-code: 0


      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: SBOM (Anchore / Syft)
        # P4.9g: the ``v0.17.0`` tag no longer resolves on the
        # Marketplace. Verified via
        # ``gh api repos/anchore/sbom-action/releases``: current
        # latest is ``v0.24.0``.
        uses: anchore/sbom-action@v0.24.0

        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom-cyclonedx.json


  # ──────────────────────────────────────────────────────────────
  # Docker: build the backend image so we catch Dockerfile regressions
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: sentry-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — image scan
        # P4.9g: same tag bump as the security-scan job; see comment
        # there for the rationale. Keep these two pins in lockstep.
        uses: aquasecurity/trivy-action@v0.36.0

        with:
          image-ref: sentry-backend:ci
          severity: CRITICAL,HIGH
          exit-code: 0


