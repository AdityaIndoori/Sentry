name: Release

# P3.2 — Tag-driven release pipeline.
#
# Triggered by ``git tag v*`` + ``git push --tags``. Builds + pushes
# the backend image to GitHub Container Registry (GHCR) and attaches a
# CycloneDX SBOM to the release.
#
# Frontend static bundle is built in-image by ``frontend/Dockerfile``
# so releasing the backend also releases the matching frontend.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true

permissions:
  contents: write       # attach SBOM to GitHub Release
  packages: write       # push image to GHCR

jobs:
  release:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sentry-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentry-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sentry-frontend:latest

      - name: SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.17.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/sentry-backend:${{ github.ref_name }}
          format: cyclonedx-json
          artifact-name: sentry-backend-sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sentry-backend-sbom.cyclonedx.json
